<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Mood & Weather</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-row">
        <h1>Mood &amp; Weather</h1>
        <button id="btn-sync" class="sync-btn" title="Sync data">☁</button>
      </div>
      <p id="sync-info" class="sync-info hidden"></p>
      <p id="status" class="status">How do you feel today?</p>
    </header>

    <!-- Sync setup modal -->
    <div id="sync-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <h2>Sync across devices</h2>
        <p class="muted">Enter a passphrase to link your data. Use the same passphrase on all your devices.</p>
        <input type="text" id="sync-passphrase" class="text-input" placeholder="e.g. mysecretphrase123" autocomplete="off" />
        <button id="btn-sync-confirm" class="primary-btn">Connect</button>
        <button id="btn-sync-skip" class="secondary-btn">Not now</button>
        <p id="sync-modal-status" class="muted" style="margin-top:8px;min-height:1.2em"></p>
      </div>
    </div>

    <section id="view-log" class="view active">
      <div class="buttons">
        <button id="btn-good" class="mood-btn good" aria-label="I feel good today">
          <span class="emoji">😊</span>
          <span class="label">Good day</span>
        </button>
        <button id="btn-bad" class="mood-btn bad" aria-label="I feel bad today">
          <span class="emoji">😞</span>
          <span class="label">Bad day</span>
        </button>
      </div>
      <div id="today-card" class="card hidden"></div>
      <button id="btn-past" class="secondary-btn">Add past day</button>
      <div id="past-picker" class="card hidden">
        <h3>Pick a date and time</h3>
        <input type="date" id="date-input" max="" aria-label="Pick a past date" />
        <input type="time" id="time-input" aria-label="Pick a time (optional)" placeholder="Any time" />
        <button id="btn-fetch-past" class="primary-btn" disabled>Get weather</button>
        <div id="past-preview" class="hidden"></div>
      </div>
    </section>

    <section id="view-history" class="view">
      <h2>History <span id="entry-count" class="pill"></span></h2>
      <div id="history-list" class="list"></div>
    </section>

    <section id="view-predict" class="view">
      <div class="predict-header">
        <h2>Forecast predictions</h2>
        <button id="btn-refresh" class="refresh-btn" aria-label="Refresh predictions">↻ Refresh</button>
      </div>
      <p id="predict-info" class="muted"></p>
      <span id="model-label" class="pill hidden"></span>
      <div id="predict-list" class="list" style="margin-top:12px"></div>
      <div id="insights" class="card hidden"></div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-view="view-log">Log</button>
      <button class="tab" data-view="view-history">History</button>
      <button class="tab" data-view="view-predict">Predict</button>
    </nav>
  </main>

  <script src="weather.js"></script>
  <script src="model.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
